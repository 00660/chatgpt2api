services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: chatgpt2api:local
    container_name: chatgpt2api-local
    ports:
      - "8000:80"
    volumes:
      - ./data:/app/data
      - ./config.yaml:/app/config.yaml
    environment:
      CHATGPT2API_AUTH_KEY: ${CHATGPT2API_AUTH_KEY}
