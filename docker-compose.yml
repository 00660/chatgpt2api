services:
  app:
    image: ghcr.io/basketikun/chatgpt2api:latest
    container_name: chatgpt2api
    restart: unless-stopped
    ports:
      - "3000:80"
    volumes:
      - ./data:/app/data
      - ./config.yaml:/app/config.yaml
    environment:
      CHATGPT2API_AUTH_KEY: ${CHATGPT2API_AUTH_KEY}
